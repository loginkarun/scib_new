openapi: 3.0.3
info:
  title: scib_new API
  version: 1.0.0
  description: Generated from LLD batch - Complete API specification for cart coupon management
servers:
  - url: https://api.example.com
    description: Production server
tags:
  - name: cart-coupon
    description: Cart coupon management operations
paths:
  /api/cart/{cartId}/coupon:
    post:
      tags:
        - cart-coupon
      summary: Apply coupon to cart
      description: Applies a valid coupon code to the specified cart and updates the cart total
      operationId: SCRUM-11693_apply_coupon_post
      parameters:
        - name: cartId
          in: path
          required: true
          description: Unique identifier of the cart
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyCouponRequest'
      responses:
        '201':
          description: Coupon applied successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Bad request - Invalid coupon code or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - User cannot access this cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found - Cart or coupon not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []
    delete:
      tags:
        - cart-coupon
      summary: Remove coupon from cart
      description: Removes the applied coupon from the specified cart and recalculates the cart total
      operationId: SCRUM-11693_remove_coupon_delete
      parameters:
        - name: cartId
          in: path
          required: true
          description: Unique identifier of the cart
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Coupon removed successfully
        '400':
          description: Bad request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - User cannot access this cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found - Cart not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []
  /api/coupon/validate:
    post:
      tags:
        - cart-coupon
      summary: Validate coupon code
      description: Validates a coupon code for applicability to a specific cart
      operationId: SCRUM-11693_validate_coupon_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateCouponRequest'
      responses:
        '200':
          description: Coupon validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponValidationResult'
        '400':
          description: Bad request - Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - User cannot access this cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found - Cart or coupon not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - bearerAuth: []
components:
  schemas:
    ApplyCouponRequest:
      type: object
      required:
        - couponCode
      properties:
        couponCode:
          type: string
          minLength: 1
          description: The coupon code to apply
          example: SAVE20
    ValidateCouponRequest:
      type: object
      required:
        - couponCode
        - cartId
      properties:
        couponCode:
          type: string
          minLength: 1
          description: The coupon code to validate
          example: SAVE20
        cartId:
          type: string
          minLength: 1
          description: The cart ID to validate the coupon against
          example: cart123
    CartResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique cart identifier
          example: cart123
        userId:
          type: string
          description: User ID (null for guest users)
          example: user456
          nullable: true
        items:
          type: array
          description: List of items in the cart
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: number
          format: double
          description: Total cart amount after discount
          example: 89.99
        originalTotal:
          type: number
          format: double
          description: Original cart amount before discount
          example: 99.99
        appliedCoupon:
          type: string
          description: Applied coupon code
          example: SAVE20
          nullable: true
        discountAmount:
          type: number
          format: double
          description: Discount amount applied
          example: 10.00
    CartItem:
      type: object
      properties:
        id:
          type: string
          description: Cart item identifier
          example: item789
        productId:
          type: string
          description: Product identifier
          example: prod001
        quantity:
          type: integer
          description: Quantity of the product
          example: 2
        price:
          type: number
          format: double
          description: Price per unit
          example: 49.99
    CouponValidationResult:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the coupon is valid
          example: true
        couponCode:
          type: string
          description: The validated coupon code
          example: SAVE20
        discountType:
          type: string
          enum:
            - PERCENTAGE
            - FIXED_AMOUNT
          description: Type of discount
          example: PERCENTAGE
        discountValue:
          type: number
          format: double
          description: Discount value (percentage or fixed amount)
          example: 20.0
        minCartValue:
          type: number
          format: double
          description: Minimum cart value required
          example: 50.0
        expiryDate:
          type: string
          format: date
          description: Coupon expiry date
          example: 2026-12-31
        message:
          type: string
          description: Validation message
          example: Coupon is valid and applicable
        applicableItems:
          type: array
          description: List of product IDs this coupon applies to (empty if applies to all)
          items:
            type: string
          example: []
    ErrorResponse:
      type: object
      required:
        - timestamp
        - traceId
        - errorCode
        - message
      properties:
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: 2026-01-08T12:00:00Z
        traceId:
          type: string
          description: Unique trace identifier for debugging
          example: abc123xyz
        errorCode:
          type: string
          description: Application-specific error code
          example: COUPON_INVALID
        message:
          type: string
          description: Human-readable error message
          example: Coupon code invalid or expired
        details:
          type: array
          description: Detailed error information
          items:
            $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      properties:
        field:
          type: string
          description: Field name that caused the error
          example: couponCode
        issue:
          type: string
          description: Description of the issue
          example: Coupon code has expired
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication
  parameters:
    cartIdParam:
      name: cartId
      in: path
      required: true
      description: Unique identifier of the cart
      schema:
        type: string
        minLength: 1
  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Access forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'