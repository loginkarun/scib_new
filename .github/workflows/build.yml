name: Build and Test SpringBoot Application

on:
  workflow_dispatch:
    inputs:
      repo:
        description: 'Repository name'
        required: false
      branch:
        description: 'Branch name'
        required: false
        default: 'main'
      source_folder:
        description: 'Source folder containing code'
        required: false
        default: 'code'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      working-directory: code
      run: mvn clean verify
    
    - name: Generate JaCoCo Coverage Report
      working-directory: code
      run: mvn jacoco:report
      continue-on-error: true
    
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: code/target/surefire-reports/
        retention-days: 30
    
    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: code/target/site/jacoco/
        retention-days: 30
    
    - name: Build Summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Repository**: $GITHUB_REPOSITORY" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: $GITHUB_REF_NAME" >> $GITHUB_STEP_SUMMARY
        echo "- **Source Folder**: code" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status**: completed" >> $GITHUB_STEP_SUMMARY
